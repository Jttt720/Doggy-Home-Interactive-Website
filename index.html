<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<!-- 主页面 -->
    <style>

         body {
            margin: 0;
            padding: 0;
            background: url("images/背景.jpg"); /* 替换为你图片的路径 */
            background-size: cover; /* 让图片覆盖整个页面 */
            background-position: center; /* 居中显示背景图片 */
            background-attachment: fixed; /* 背景图片固定，滚动时不动 */
            color: #333;
        }
     
     
        .leaf {
            position: absolute;
            width: 50px;
            height: 50px;
            background-image: url("images/P.png"); /* Replace with your leaf image */
            background-size: cover;
            opacity: 0.8;
            transform: translateY(-100%);
        }
       
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        
        .slideshow {
            margin-top: 20px;
        }
        .swiper {
            width: 60%;
            height: 500px;
        }
        .swiper-slide img {
            width: 740px;
            height: 450px;
          
        }

        .wave{
            display: flex;
            filter: drop-shadow(120px 0 0 #ffc0a9);
            position: absolute;   
       }

        .wave div{
            position: relative;
            width: 20px;
            height: 100px;
            margin: 7px;
            border-radius: 3px;
            overflow: hidden;
        }
       .wave div::before{
            content: "";
            width: 300%;
            height: 100%;
            background-color: #ff9a76;
            position: absolute;
            left: -100%;
            top: 50%;
            animation: upDown 2s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite alternate, wave 2s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite alternate;
            animation-delay: var(--d1), var(--d2);
        }

        @keyframes upDown {
            0%{
                top: 70%;
        }
            100%{
                top: 30%;
        }
        }
        @keyframes wave {
            0%{
                transform: rotateZ(-20deg);
        }
            100%{
                 transform: rotateZ(20deg);
        }
            }

        /* 让swiper容器宽度为页面的三分之一，并让图片平铺且不变形 */
        .swiper {
            width: 100%; /* 宽度为页面的三分之一 */
            height: auto; /* 高度自适应 */
            margin: 0 auto; /* 水平居中 */
        }

        .swiper-slide img {
            width: 100%; /* 图片宽度自适应父容器 */
            height: auto; /* 高度自适应保持比例 */
            object-fit: cover; /* 保持图片比例并覆盖容器 */
        }

       .header ul {
           list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #A4E0FF;
            padding: 10px 20px;
            opacity: 0.9; /* 整体透明度 */
        }

        .header  ulli {
            display: inline;
        }

        .header input[type="text"] {
            padding: 5px;
            margin-right: 10px;
            border: 1px solid #FF7043;
            border-radius: 5px;
        }

        .header input[type="submit"] {
            padding: 5px 10px;
            border: none;
            background-color: #0260A0; /* 按钮背景颜色 */
            color: #fff; /* 按钮文字颜色 */
            border-radius: 5px;
            cursor: pointer;
        }

        nav .navlist {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-around;
            background-color:#BFD641;
            padding: 10px 0;
        }

        nav .navlist li {
            display: inline;
        }

        nav .navlist a {
            text-decoration: none;
            font-weight: bold;
            color: white;
            padding: 10px;
            transition: background-color 0.3s ease;
        }

        nav .navlist a:hover {
            background-color: #ff6f61;
        }

        .content input[type="text"],
        .content textarea {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .content input[type="submit"] {
            padding: 10px;
            background-color: #ff9a76;
            border: none;
            cursor: pointer;
            color: white;
            border-radius: 4px;
        }

         .headlist ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ff6f61;
            padding: 10px 20px;
        }

        .container .header .title {
            font-size: 24px; /* 设置字体大小 */
            font-weight: bold; /* 加粗 */
            color: #333; /* 设置字体颜色 */
            text-align: center;
            background-image: url('images/icon1.png'); /* 添加图标路径 */
            background-repeat: no-repeat;
            background-size: 30px; /* 调整图标大小 */
            background-position: left center; /* 图标位置 */
            padding-left: 34px; /* 给文本留出图标空间 */
            display: inline-block;
        }

        .header ul {
            display: flex;
            align-items: center;
        }

        .title1 {
            float: left;
            font-size: 16px;
            padding: 5px 10px;
            display: inline-block;
            vertical-align: middle;
        }

    </style>
 
</head>

<!--页面滑落效果-->
<script>
    const numLeaves = 20;
    const leaves = [];
    const speeds = []; // 存储每片叶子的下落速度
    const driftSpeeds = []; // 存储水平漂移速度

    for (let i = 0; i < numLeaves; i++) {
        const leaf = document.createElement('div');
        leaf.classList.add('leaf');
        leaf.style.left = Math.random() * window.innerWidth + 'px';
        leaf.style.top = Math.random() * -window.innerHeight + 'px';

        document.body.appendChild(leaf);
        leaves.push(leaf);

        // 初始化每片叶子的下落速度和漂移速度
        speeds.push(1 + Math.random() * 2); // 下落速度 1~3 像素/帧
        driftSpeeds.push((Math.random() - 0.5) * 0.5); // 漂移速度 -0.25~0.25 像素/帧
    }


    function animateLeaves() {
        leaves.forEach(leaf => {
            const top = parseFloat(leaf.style.top);
            const left = parseFloat(leaf.style.left);
            const newTop = top + Math.random() * 1;
            const newLeft = left + (Math.random() - 0.5) * 0;

            leaf.style.top = newTop + 'px';
            leaf.style.left = newLeft + 'px';


            if (newTop > window.innerHeight) {
                leaf.style.top = Math.random() * -window.innerHeight + 'px';
                leaf.style.left = Math.random() * window.innerWidth + 'px';
            }
        });

        requestAnimationFrame(animateLeaves);
    }

    animateLeaves();
</script>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        var mySwiper = new Swiper('.swiper', {
            loop: true,
            autoplay: {
                delay: 2000,
            },

                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>

    <script>
        const colorChangeButton = document.getElementById('colorChangeButton');
        const dogtype = document.getElementById('dogtype');

        const colors = ['red', 'blue', 'green', 'yellow', 'purple'];
        let colorIndex = 0;

        colorChangeButton.addEventListener('click', function () {
            dogtype.style.color = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
        });
    </script>
